<body>
  <div class="container">
    <div class="loader-container">
      <div class="loading">
        <div class="dot light-blue"></div>
        <div class="dot light-blue"></div>
        <div class="dot light-blue"></div>
        <div class="dot aqua"></div>
        <div class="dot aqua"></div>
      </div>
    </div>

    <div class="stop-selection-header header">
      <div class="arrow-and-heading-wrapper">
        <span class="material-symbols-outlined back-from-stop-selection" onclick="back()"> arrow_back </span>
        <h1>Recent Orders</h1>
      </div>
      <a href="#" class="help-btn" onclick="openHelpPage()">Help</a>
    </div>

    <div class="recent-orders">
      <div id="recent-orders-list"></div>
      <template id="recent-order-item-template">
        <div class="order-item">
          <div class="past-ticket">
            <div class="ticket-count"><span class="past-ticket-passenger">1</span> Adult Ticket</div>
            <div class="past-ticket-content">
              <div class="from-past">Jai Jogani Mata Chowk Brts</div>
              <span class="material-symbols-outlined" style="font-size: 15px;">
                east
              </span>
              <div class="to-past">Someshwar Junction Brts</div>
            </div>
          </div>
          <button class="buy-again-btn">Buy&nbsp;₹<span class="past-order-price">4</span></button>
        </div>
      </template>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./serviceworker.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Override the default limit of 2 for this page
    if (typeof crateResentOrderList === 'function') {
      crateResentOrderList(0); 
    }
  });
  window.onload = function () {
    const loader = document.querySelector(".loader-container");
    if (loader) {
      loader.style.display = "none";
    }

    // Show your main content here if it's hidden
    const mainContent = document.querySelector(".container"); // adjust selector
    if (mainContent) {
      mainContent.style.display = "block";
    }
  };
</script>
